<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Letter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a; color: #eee;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex; height: 100vh; overflow: hidden;
  }
  #sidebar {
    width: 280px; min-width: 280px;
    background: #222; border-right: 1px solid #333;
    padding: 20px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 18px;
  }
  #sidebar h1 { font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #888; }
  .section { display: flex; flex-direction: column; gap: 8px; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row label { font-size: 12px; color: #aaa; min-width: 72px; }
  input[type="text"] {
    background: #333; color: #eee; border: 1px solid #555; border-radius: 4px;
    padding: 8px 12px; font-size: 20px; font-weight: 700; text-align: center;
    width: 100%; text-transform: uppercase;
  }
  input[type="text"]:focus { outline: none; border-color: #888; }
  input[type="range"] { flex: 1; accent-color: #888; cursor: pointer; }
  .color-input {
    width: 36px; height: 28px; border: 1px solid #555; border-radius: 4px;
    background: none; cursor: pointer; padding: 0;
  }
  .val { font-size: 11px; color: #666; min-width: 30px; text-align: right; font-variant-numeric: tabular-nums; }
  .letter-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; }
  .letter-btn {
    padding: 5px 0; border-radius: 4px; border: 1px solid #444;
    background: #2a2a2a; color: #ccc; font-size: 12px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.1s;
  }
  .letter-btn:hover { background: #444; color: #fff; }
  .letter-btn.active { background: #555; border-color: #777; color: #fff; }
  .btn-row { display: flex; gap: 6px; }
  .btn-action {
    flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #444;
    background: #2a2a2a; color: #ccc; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-action:hover { background: #444; border-color: #666; color: #fff; }
  #canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #181818; overflow: hidden;
  }
  canvas { box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Line Letter</h1>

  <div class="section">
    <div class="section-label">Character</div>
    <input type="text" id="charInput" value="G" maxlength="1">
  </div>

  <div class="section">
    <div class="section-label">Quick Pick</div>
    <div class="letter-grid" id="letterGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">Colors</div>
    <div class="row">
      <label>Background</label>
      <input type="color" class="color-input" id="bgColor" value="#000000">
    </div>
    <div class="row">
      <label>Shape</label>
      <input type="color" class="color-input" id="fgColor" value="#ffffff">
    </div>
  </div>

  <div class="section">
    <div class="section-label">Shape</div>
    <div class="row">
      <label>Corner</label>
      <input type="range" id="cornerRadius" min="0" max="50" value="22">
      <span class="val" id="cornerRadiusVal">22%</span>
    </div>
    <div class="row">
      <label>Padding</label>
      <input type="range" id="padding" min="0" max="25" value="8">
      <span class="val" id="paddingVal">8%</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Line Cuts</div>
    <div class="row">
      <label>Width</label>
      <input type="range" id="lineWidth" min="5" max="45" value="22">
      <span class="val" id="lineWidthVal">22%</span>
    </div>
    <div class="row">
      <label>Depth</label>
      <input type="range" id="depthMult" min="30" max="200" value="100">
      <span class="val" id="depthMultVal">100%</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Export</div>
    <div class="row">
      <label>Size</label>
      <input type="range" id="canvasSize" min="400" max="2400" step="100" value="800">
      <span class="val" id="canvasSizeVal">800</span>
    </div>
    <div class="btn-row">
      <button class="btn-action" id="downloadPNG">PNG</button>
      <button class="btn-action" id="downloadSVG">SVG</button>
    </div>
  </div>
</div>

<div id="canvas-area">
  <canvas id="c" width="800" height="800"></canvas>
</div>

<script>
// ─── Letter cut definitions ───
// Each cut is a path: array of [x,y] points in 0-1 normalized coords.
// Points at edges (0 or 1) connect to the shape boundary.
// Segments between consecutive points are drawn as thick lines (lineWidth).
// Right-angle turns at interior joints are filled automatically.
// Interior paths (no point on an edge) create floating cuts inside the shape.
const CUTS = {
  // L-path letters — right-angle turns for much better shapes
  'A': [{path:[[.5,1],[.5,.42],[1,.42]]}],            // bottom→up→right (interior + crossbar)
  'F': [{path:[[1,.42],[.42,.42],[.42,1]]}],           // right→left→down (removes lower-right)
  'G': [{path:[[1,.32],[.52,.32],[.52,.68]]}],         // right→left→down (the G hook)
  'R': [{path:[[1,.5],[.55,.5],[.55,1]]}],             // right→left→down (bump + leg)
  'Y': [{path:[[.5,0],[.5,.38]]},                      // fork from top
        {path:[[0,.62],[.35,.62],[.35,1]]},             // lower-left L removes lower-left
        {path:[[1,.62],[.65,.62],[.65,1]]}],            // lower-right L removes lower-right
  '1': [{path:[[0,.42],[.5,.42],[.5,1]]}],             // left→right→down (serif + narrow stroke)
  '2': [{path:[[0,.35],[.55,.35],[.55,0]]},            // upper-left L (removes upper-left)
        {path:[[1,.65],[.45,.65],[.45,1]]}],            // lower-right L (removes lower-right)
  '4': [{path:[[0,.42],[.38,.42],[.38,1]]}],           // left→right→down (crossbar + open bottom)
  '5': [{path:[[1,.35],[.45,.35],[.45,0]]},            // upper-right L
        {path:[[0,.65],[.55,.65],[.55,1]]}],            // lower-left L
  '7': [{path:[[.32,1],[.32,.28],[0,.28]]}],           // bottom→up→left (stroke + top bar)

  // Interior cuts — floating marks inside the shape
  'O': [{path:[[.35,.5],[.65,.5]]}],                   // horizontal interior mark
  '0': [{path:[[.5,.35],[.5,.65]]}],                   // vertical interior mark

  // Simple edge cuts (straight lines from edges)
  'B': [{path:[[1,.5],[.7,.5]]}],
  'C': [{path:[[1,.5],[.38,.5]]}],
  'D': [{path:[[.35,0],[.35,.88]]}],
  'E': [{path:[[1,.3],[.42,.3]]}, {path:[[1,.7],[.42,.7]]}],
  'H': [{path:[[.5,0],[.5,.38]]}, {path:[[.5,1],[.5,.62]]}],
  'I': [{path:[[0,.5],[.35,.5]]}, {path:[[1,.5],[.65,.5]]}],
  'J': [{path:[[.3,0],[.3,.65]]}],
  'K': [{path:[[1,.3],[.55,.3]]}, {path:[[1,.7],[.55,.7]]}, {path:[[0,.5],[.2,.5]]}],
  'L': [{path:[[.62,0],[.62,.72]]}],
  'M': [{path:[[.33,1],[.33,.45]]}, {path:[[.67,1],[.67,.45]]}],
  'N': [{path:[[.35,0],[.35,.58]]}, {path:[[.65,1],[.65,.42]]}],
  'P': [{path:[[1,.65],[.5,.65]]}],
  'Q': [{path:[[.35,.5],[.65,.5]]}, {path:[[.72,1],[.72,.78]]}],
  'S': [{path:[[1,.3],[.48,.3]]}, {path:[[0,.7],[.52,.7]]}],
  'T': [{path:[[.25,1],[.25,.28]]}, {path:[[.75,1],[.75,.28]]}],
  'U': [{path:[[.5,0],[.5,.58]]}],
  'V': [{path:[[.5,0],[.5,.7]]}],
  'W': [{path:[[.33,0],[.33,.55]]}, {path:[[.67,0],[.67,.55]]}],
  'X': [{path:[[.5,0],[.5,.32]]}, {path:[[.5,1],[.5,.68]]}, {path:[[0,.5],[.32,.5]]}, {path:[[1,.5],[.68,.5]]}],
  'Z': [{path:[[0,.32],[.55,.32]]}, {path:[[1,.68],[.45,.68]]}],
  '3': [{path:[[0,.33],[.52,.33]]}, {path:[[0,.67],[.52,.67]]}],
  '6': [{path:[[1,.33],[.52,.33]]}],
  '8': [{path:[[0,.5],[.15,.5]]}, {path:[[1,.5],[.85,.5]]}],
  '9': [{path:[[0,.67],[.48,.67]]}],
};

const state = {
  letter: 'G', bgColor: '#000000', fgColor: '#ffffff',
  size: 800, padding: 0.08, cornerRadius: 0.22,
  lineWidth: 0.22, depthMult: 1.0,
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function draw() {
  const s = state.size;
  canvas.width = s; canvas.height = s;
  const pad = s * state.padding;
  const ss = s - pad * 2;
  const r = state.cornerRadius * ss / 2;
  const lw = state.lineWidth * ss;
  const hw = lw / 2;
  const dm = state.depthMult;

  // Background
  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, s, s);

  // Rounded square
  ctx.fillStyle = state.fgColor;
  roundRect(ctx, pad, pad, ss, ss, r);
  ctx.fill();

  // Draw cuts
  const cuts = CUTS[state.letter] || [];
  ctx.fillStyle = state.bgColor;

  for (const cut of cuts) {
    // Apply depth multiplier — scale interior points away from center
    const sp = cut.path.map(([x, y]) => {
      const ex = (x <= 0.001 || x >= 0.999);
      const ey = (y <= 0.001 || y >= 0.999);
      return [
        ex ? x : Math.max(0, Math.min(1, 0.5 + (x - 0.5) * dm)),
        ey ? y : Math.max(0, Math.min(1, 0.5 + (y - 0.5) * dm)),
      ];
    });

    for (let i = 0; i < sp.length - 1; i++) {
      const [x1n, y1n] = sp[i];
      const [x2n, y2n] = sp[i + 1];
      const x1 = pad + x1n * ss, y1 = pad + y1n * ss;
      const x2 = pad + x2n * ss, y2 = pad + y2n * ss;

      if (Math.abs(x1n - x2n) < 0.001) {
        // Vertical segment
        const x = (x1 + x2) / 2;
        let top = Math.min(y1, y2), bot = Math.max(y1, y2);
        if (Math.min(y1n, y2n) <= 0.001) top = 0; else top -= hw;
        if (Math.max(y1n, y2n) >= 0.999) bot = s; else bot += hw;
        ctx.fillRect(x - hw, top, lw, bot - top);
      } else {
        // Horizontal segment
        const y = (y1 + y2) / 2;
        let left = Math.min(x1, x2), right = Math.max(x1, x2);
        if (Math.min(x1n, x2n) <= 0.001) left = 0; else left -= hw;
        if (Math.max(x1n, x2n) >= 0.999) right = s; else right += hw;
        ctx.fillRect(left, y - hw, right - left, lw);
      }
    }
  }

  const maxD = Math.min(window.innerWidth - 310, window.innerHeight - 40, 700);
  canvas.style.width = maxD + 'px'; canvas.style.height = maxD + 'px';
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r); c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h); c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r); c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y); c.closePath();
}

function generateSVG() {
  const s = state.size, pad = s * state.padding, ss = s - pad * 2;
  const r = state.cornerRadius * ss / 2, lw = state.lineWidth * ss;
  const hw = lw / 2, dm = state.depthMult;
  const cuts = CUTS[state.letter] || [];

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">\n`;
  svg += `<rect width="${s}" height="${s}" fill="${state.bgColor}"/>\n`;
  svg += `<rect x="${pad}" y="${pad}" width="${ss}" height="${ss}" rx="${r}" ry="${r}" fill="${state.fgColor}"/>\n`;

  for (const cut of cuts) {
    const sp = cut.path.map(([x, y]) => {
      const ex = (x <= 0.001 || x >= 0.999);
      const ey = (y <= 0.001 || y >= 0.999);
      return [
        ex ? x : Math.max(0, Math.min(1, 0.5 + (x - 0.5) * dm)),
        ey ? y : Math.max(0, Math.min(1, 0.5 + (y - 0.5) * dm)),
      ];
    });

    for (let i = 0; i < sp.length - 1; i++) {
      const [x1n, y1n] = sp[i];
      const [x2n, y2n] = sp[i + 1];
      const x1 = pad + x1n * ss, y1 = pad + y1n * ss;
      const x2 = pad + x2n * ss, y2 = pad + y2n * ss;
      let rx, ry, rw, rh;

      if (Math.abs(x1n - x2n) < 0.001) {
        const x = (x1 + x2) / 2;
        let top = Math.min(y1, y2), bot = Math.max(y1, y2);
        if (Math.min(y1n, y2n) <= 0.001) top = 0; else top -= hw;
        if (Math.max(y1n, y2n) >= 0.999) bot = s; else bot += hw;
        rx = x - hw; ry = top; rw = lw; rh = bot - top;
      } else {
        const y = (y1 + y2) / 2;
        let left = Math.min(x1, x2), right = Math.max(x1, x2);
        if (Math.min(x1n, x2n) <= 0.001) left = 0; else left -= hw;
        if (Math.max(x1n, x2n) >= 0.999) right = s; else right += hw;
        rx = left; ry = y - hw; rw = right - left; rh = lw;
      }
      svg += `<rect x="${rx.toFixed(1)}" y="${ry.toFixed(1)}" width="${rw.toFixed(1)}" height="${rh.toFixed(1)}" fill="${state.bgColor}"/>\n`;
    }
  }
  return svg + `</svg>`;
}

// ─── UI ───
const charInput = document.getElementById('charInput');
const grid = document.getElementById('letterGrid');

'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('').forEach(ch => {
  const btn = document.createElement('button');
  btn.className = 'letter-btn' + (ch === state.letter ? ' active' : '');
  btn.textContent = ch;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.letter = ch; charInput.value = ch; draw();
  });
  grid.appendChild(btn);
});

charInput.addEventListener('input', () => {
  let v = charInput.value.toUpperCase().slice(-1);
  charInput.value = v;
  if (v) {
    state.letter = v;
    document.querySelectorAll('.letter-btn').forEach(b => b.classList.toggle('active', b.textContent === v));
    draw();
  }
});
charInput.addEventListener('focus', () => charInput.select());

function wireSlider(id, prop, transform, suffix) {
  const el = document.getElementById(id), val = document.getElementById(id + 'Val');
  el.addEventListener('input', () => {
    state[prop] = transform(parseFloat(el.value));
    if (val) val.textContent = el.value + (suffix || '');
    draw();
  });
}
wireSlider('cornerRadius', 'cornerRadius', v => v/100, '%');
wireSlider('padding', 'padding', v => v/100, '%');
wireSlider('lineWidth', 'lineWidth', v => v/100, '%');
wireSlider('depthMult', 'depthMult', v => v/100, '%');
wireSlider('canvasSize', 'size', v => v, '');

document.getElementById('bgColor').addEventListener('input', e => { state.bgColor = e.target.value; draw(); });
document.getElementById('fgColor').addEventListener('input', e => { state.fgColor = e.target.value; draw(); });

document.getElementById('downloadPNG').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = `letter-${state.letter}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
});
document.getElementById('downloadSVG').addEventListener('click', () => {
  const blob = new Blob([generateSVG()], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = `letter-${state.letter}.svg`;
  a.href = url; a.click();
  URL.revokeObjectURL(url);
});

window.addEventListener('resize', draw);
draw();
</script>
<script src="/tools/nav.js"></script>
</body>
</html>
