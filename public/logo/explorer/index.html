<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

<style>
  :root {
    --bg: #fdfdfc;
    --fg: #111;
    --fg-muted: rgba(17, 17, 17, 0.58);
    --fg-faded: rgba(17, 17, 17, 0.4);
    --fg-quiet: rgba(17, 17, 17, 0.32);
    --border: rgba(17, 17, 17, 0.1);
    --border-subtle: rgba(17, 17, 17, 0.06);
    --tile-bg: #f4f3f1;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, Courier, monospace;
    color-scheme: light;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }

  .page {
    max-width: 1120px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }

  /* ── Header ── */
  .head {
    margin-bottom: 24px;
  }
  .crumb {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--fg-faded);
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 12px;
    transition: color 0.15s ease;
  }
  .crumb:hover { color: var(--fg); }
  .crumb svg { width: 12px; height: 12px; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .lede {
    color: var(--fg-muted);
    font-size: 14px;
    margin-bottom: 18px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 14px 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
  }
  .toolbar__spacer { flex: 1; }

  .ctl-stack {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 18px;
    row-gap: 10px;
    align-items: center;
  }
  .ctl { display: contents; }
  .ctl__label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--fg-faded);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Segmented control — soft tinted pill for active. */
  .seg {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .seg__opt {
    appearance: none;
    background: transparent;
    border: 0;
    padding: 5px 11px;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-faded);
    cursor: pointer;
    border-radius: 6px;
    transition: color 0.15s ease, background 0.15s ease;
    user-select: none;
  }
  .seg__opt:hover { color: var(--fg); }
  .seg__opt.is-active {
    color: var(--fg);
    background: rgba(17, 17, 17, 0.07);
  }

  .ctl__input {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 8px;
    font: inherit;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--fg);
    background: var(--bg);
    width: 56px;
    text-align: center;
    text-transform: uppercase;
    transition: border-color 0.15s ease;
  }
  .ctl__input::placeholder { color: var(--fg-quiet); text-transform: none; }
  .ctl__input:focus {
    outline: 0;
    border-color: var(--fg);
  }

  .btn {
    appearance: none;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 12px;
    font: inherit;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    user-select: none;
  }
  .btn:hover { border-color: var(--fg); }
  .btn--primary {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .btn--primary:hover { background: transparent; border-color: var(--fg); }
  .btn svg { width: 12px; height: 12px; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

  .btn--shuffle { perspective: 220px; }
  .btn--shuffle .ico-shuffle {
    width: 14px;
    height: 14px;
    transform-style: preserve-3d;
  }
  .btn--shuffle.is-spinning .ico-shuffle {
    animation: shuffleFlipX 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes shuffleFlipX {
    from { transform: rotateX(0deg); }
    to   { transform: rotateX(360deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .btn--shuffle.is-spinning .ico-shuffle { animation: none; }
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  @media (max-width: 880px) {
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
  }
  @media (max-width: 540px) {
    .grid { grid-template-columns: 1fr; gap: 14px; }
    .page { padding: 32px 20px 80px; }
    h1 { font-size: 19px; }
  }

  /* ── Tile ── */
  .tile {
    position: relative;
    display: block;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--tile-bg);
    text-decoration: none;
    color: inherit;
    aspect-ratio: 1 / 1;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .tile:hover {
    border-color: var(--fg);
    box-shadow: 0 2px 12px rgba(17, 17, 17, 0.06);
  }
  .tile:focus-visible {
    outline: 2px solid var(--fg);
    outline-offset: 2px;
  }

  .tile iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--tile-bg);
    /* Crucial: clicks pass through to the wrapping anchor. */
    pointer-events: none;
  }

  .tile__skel {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-quiet);
    font-size: 11px;
    font-family: var(--font-mono);
    background: linear-gradient(90deg, var(--tile-bg) 0%, #ebeae7 50%, var(--tile-bg) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s ease-in-out infinite;
  }
  .tile.is-ready .tile__skel { display: none; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tile__skel { animation: none; background: var(--tile-bg); }
  }

  .tile__fail {
    display: none;
    position: absolute;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px;
    text-align: center;
    color: var(--fg-muted);
    font-size: 12px;
  }
  .tile.is-failed .tile__skel { display: none; }
  .tile.is-failed iframe { display: none; }
  .tile.is-failed .tile__fail { display: flex; }

  /* Hover label — name of the tool, peeks up from the bottom */
  .tile__label {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 8px 10px;
    background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 70%, rgba(255,255,255,0) 100%);
    font-size: 12px;
    font-weight: 500;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
  }
  .tile:hover .tile__label,
  .tile:focus-visible .tile__label {
    opacity: 1;
    transform: translateY(0);
  }
  .tile__label .ico-out {
    width: 11px;
    height: 11px;
    color: var(--fg-muted);
    flex-shrink: 0;
  }

  /* ── Footer ── */
  .foot {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--fg-faded);
    font-size: 12.5px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .foot a {
    color: var(--fg-muted);
    text-decoration: none;
  }
  .foot a:hover { color: var(--fg); text-decoration: underline; text-underline-offset: 3px; }

  kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--tile-bg);
    color: var(--fg-muted);
  }
</style>
</head>
<body>

<div class="page">

  <header class="head">
    <a class="crumb" href="/logo/">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7.5 3L4.5 6L7.5 9"/>
      </svg>
      Logo Lab
    </a>
    <h1>Explorer</h1>
    <p class="lede">Click a tile to open it. Press <kbd>S</kbd> to shuffle.</p>

    <div class="toolbar" role="toolbar" aria-label="Explorer controls">
      <div class="ctl-stack">
        <div class="ctl">
          <span class="ctl__label">Color</span>
          <div class="seg" role="radiogroup" aria-label="Color palette">
            <button type="button" class="seg__opt" role="radio" aria-checked="false" data-ctl="palette" data-value="mono">B&amp;W</button>
            <button type="button" class="seg__opt is-active" role="radio" aria-checked="true" data-ctl="palette" data-value="full">Full color</button>
          </div>
        </div>

        <div class="ctl">
          <span class="ctl__label">Style</span>
          <div class="seg" role="radiogroup" aria-label="Mark style">
            <button type="button" class="seg__opt" role="radio" aria-checked="false" data-ctl="style" data-value="letters">Letters</button>
            <button type="button" class="seg__opt" role="radio" aria-checked="false" data-ctl="style" data-value="abstract">Abstract</button>
            <button type="button" class="seg__opt is-active" role="radio" aria-checked="true" data-ctl="style" data-value="mixed">Mixed</button>
          </div>
        </div>

        <div class="ctl">
          <label class="ctl__label" for="monogram">Monogram</label>
          <input type="text" class="ctl__input" id="monogram" maxlength="2" placeholder="any" autocomplete="off" spellcheck="false" aria-label="Monogram letters">
        </div>
      </div>

      <div class="toolbar__spacer"></div>

      <button type="button" class="btn btn--primary btn--shuffle" id="shuffle" aria-label="Shuffle tiles">
        <svg class="ico-shuffle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 18h5"/>
          <path d="M3 6h4c1.5 0 2.5 1 3.5 2.5l3 7c1 1.5 2 2.5 3.5 2.5"/>
          <path d="M16 6h5"/>
          <path d="M3 18h4c1.5 0 2.5-1 3.5-2.5"/>
          <path d="M13.5 8.5C14.5 7 15.5 6 17 6"/>
          <path d="M19 16l2 2-2 2"/>
          <path d="M19 4l2 2-2 2"/>
        </svg>
        Shuffle
      </button>
    </div>
  </header>

  <div class="grid" id="grid" role="list"></div>

  <footer class="foot">
    <span>Each tile is the same tool you'd open standalone — same URL, same params.</span>
    <a href="/logo/">All tools →</a>
  </footer>
</div>

<script src="/shared/tools-registry.js"></script>
<script>
(function () {
  'use strict';

  if (!window.LogoTools) {
    console.warn('[explorer] registry missing');
    return;
  }

  const TOOLS = window.LogoTools.TOOLS;
  const toolPath = window.LogoTools.toolPath;

  const ORIGIN = location.origin;
  const TILE_COUNT = 18;
  const SHUFFLE_STAGGER_MS = 60;
  const PRIORITY_STAGGER_MS = 28;
  const LAZY_OBSERVER_DELAY_MS = 260;
  const MOUNT_ROOT_MARGIN = '220px';

  /* Curated preset bank — { slug: [seed, ...] }. Loaded once at boot.
     Every tile picks a (slug, seed) pair from this bank rather than
     generating a random seed. The seed determines structural params
     (composition, density, ratios); palette and monogram are layered
     on top via URL params so each preset can render in mono or full
     color and with arbitrary monogram letters. */
  let PRESETS = {};

  /* Tools whose primary visual is a glyph (have a `ch` text field).
     Used by the Style filter — Letters / Abstract / Mixed. */
  const LETTER_TOOLS = new Set([
    'echo-stripes', 'parallel-letters', 'brutalist-letters',
    'line-warp', 'dot-grid'
  ]);

  /* Toolbar state. Drives the per-iframe URL params. */
  const state = {
    palette: 'full',    // 'mono' | 'full'
    style: 'mixed',     // 'letters' | 'abstract' | 'mixed'
    monogram: '',       // '' or 1–2 chars from [A-Z0-9]
  };

  /* ── Helpers ── */

  /* Pick a curated seed for a given tool from the preset bank. Falls
     back to a fixed default seed if the bank is missing entries (only
     happens before presets.json finishes loading). */
  function pickSeed(slug) {
    const bank = PRESETS[slug];
    if (bank && bank.length) {
      return bank[Math.floor(Math.random() * bank.length)];
    }
    return '0';
  }

  /* Fisher–Yates shuffle, returns a new array */
  function shuffled(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function embedUrl(slug, seed) {
    /* r=1 tells permalink.js to randomize every schema field via the seed.
       Same URL → same render (deterministic), and the new tab matches the tile.
       p (palette) and m (monogram) constrain the random output.
       index.html is appended explicitly so this works in dev (Astro's
       dev server doesn't resolve trailing-slash → directory-index). */
    const parts = ['v=1', 'r=1', 'seed=' + seed];
    if (state.palette === 'mono') parts.push('p=mono');
    if (state.monogram) parts.push('m=' + encodeURIComponent(state.monogram));
    return ORIGIN + toolPath(slug) + 'index.html#' + parts.join('&');
  }

  function availableTools() {
    if (state.style === 'letters')  return TOOLS.filter(t => LETTER_TOOLS.has(t.slug));
    if (state.style === 'abstract') return TOOLS.filter(t => !LETTER_TOOLS.has(t.slug));
    return TOOLS;
  }

  /* Pick `n` tools, allowing repeats only if the available set is smaller. */
  function pickTools(n) {
    const avail = availableTools();
    if (avail.length === 0) return [];
    const picks = shuffled(avail).slice(0, Math.min(n, avail.length));
    while (picks.length < n) {
      picks.push(avail[Math.floor(Math.random() * avail.length)]);
    }
    return picks;
  }

  function priorityTileCount() {
    if (window.matchMedia('(min-width: 881px)').matches) return 9;
    if (window.matchMedia('(min-width: 541px)').matches) return 6;
    return 4;
  }

  /* ── Tile construction ── */

  const grid = document.getElementById('grid');
  /* Tracks pending mount tasks per tile so shuffle can cancel mid-flight loads */
  const tiles = [];

  function makeTile(slug, name) {
    const a = document.createElement('a');
    a.className = 'tile';
    a.setAttribute('role', 'listitem');
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.dataset.slug = slug;

    const skel = document.createElement('div');
    skel.className = 'tile__skel';
    skel.textContent = name;

    const fail = document.createElement('div');
    fail.className = 'tile__fail';
    fail.innerHTML = '<div>Preview unavailable</div><div style="font-size:11px">Click to open '
      + name.replace(/[<&>]/g, '') + '</div>';

    const label = document.createElement('div');
    label.className = 'tile__label';
    const labelText = document.createElement('span');
    labelText.textContent = name;
    const labelIco = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    labelIco.setAttribute('class', 'ico-out');
    labelIco.setAttribute('viewBox', '0 0 12 12');
    labelIco.setAttribute('fill', 'none');
    labelIco.setAttribute('stroke', 'currentColor');
    labelIco.setAttribute('stroke-width', '1.4');
    labelIco.setAttribute('stroke-linecap', 'round');
    labelIco.setAttribute('stroke-linejoin', 'round');
    labelIco.innerHTML = '<path d="M3 3h6v6"/><path d="M9 3L3 9"/>';
    label.appendChild(labelText);
    label.appendChild(labelIco);

    a.appendChild(skel);
    a.appendChild(fail);
    a.appendChild(label);

    return a;
  }

  function buildTiles() {
    const picks = pickTools(TILE_COUNT);
    grid.innerHTML = '';
    tiles.length = 0;

    picks.forEach((tool) => {
      const seed = pickSeed(tool.slug);
      const url = embedUrl(tool.slug, seed);
      const el = makeTile(tool.slug, tool.name);
      el.href = url;

      const t = {
        el: el,
        slug: tool.slug,
        seed: seed,
        url: url,
        iframe: null,
        token: 0,           // bumps on every (re)assign — stale loads ignored
        mounted: false,
        settled: false,
      };
      tiles.push(t);
      grid.appendChild(el);
    });
  }

  /* ── Mount / lazy-load ── */

  function mountTile(t, opts) {
    if (t.mounted) return;
    t.mounted = true;
    const priority = !!(opts && opts.priority);
    const myToken = t.token;

    const iframe = document.createElement('iframe');
    iframe.setAttribute('title', t.slug + ' preview');
    iframe.setAttribute('loading', priority ? 'eager' : 'lazy');
    iframe.setAttribute('scrolling', 'no');
    iframe.setAttribute('aria-hidden', 'true'); // anchor carries the link semantics
    iframe.setAttribute('tabindex', '-1');
    iframe.src = t.url;

    const settle = (ok) => {
      if (myToken !== t.token) return; // stale (shuffled away)
      if (t.settled) return;
      t.settled = true;
      t.el.classList.add(ok ? 'is-ready' : 'is-failed');
    };

    iframe.addEventListener('load', () => settle(true));
    iframe.addEventListener('error', () => settle(false));

    setTimeout(() => {
      if (myToken !== t.token) return;
      if (!t.settled) {
        console.warn('[mosaic] iframe timeout', t.slug);
        settle(false);
      }
    }, 12000);

    t.iframe = iframe;
    /* Insert before skeleton so it paints behind it until ready. */
    t.el.insertBefore(iframe, t.el.firstChild);
  }

  function scheduleMount(t, delay, priority) {
    const myToken = t.token;
    setTimeout(() => {
      if (myToken !== t.token) return;
      if (!t.el.isConnected) return;
      mountTile(t, { priority: priority });
    }, delay);
  }

  let mountObserver = null;
  let mountCycle = 0;
  function setupMountObserver() {
    if (mountObserver) mountObserver.disconnect();
    const cycle = ++mountCycle;

    const priorityCount = Math.min(priorityTileCount(), tiles.length);
    tiles.slice(0, priorityCount).forEach((t, i) => {
      scheduleMount(t, i * PRIORITY_STAGGER_MS, true);
    });

    const lazyTiles = tiles.slice(priorityCount);
    if (!lazyTiles.length) return;

    setTimeout(() => {
      if (cycle !== mountCycle) return;

      if (!('IntersectionObserver' in window)) {
        lazyTiles.forEach((t, i) => {
          scheduleMount(t, i * SHUFFLE_STAGGER_MS, false);
        });
        return;
      }

      mountObserver = new IntersectionObserver((entries) => {
        entries.forEach((en) => {
          if (!en.isIntersecting) return;
          const t = tiles.find((x) => x.el === en.target);
          if (t) mountTile(t, { priority: false });
          mountObserver.unobserve(en.target);
        });
      }, { rootMargin: MOUNT_ROOT_MARGIN });

      lazyTiles.forEach((t) => mountObserver.observe(t.el));
    }, priorityCount * PRIORITY_STAGGER_MS + LAZY_OBSERVER_DELAY_MS);
  }

  /* ── Shuffle ── */

  let shuffling = false;
  const shuffleBtn = document.getElementById('shuffle');

  function shuffle() {
    if (shuffling) return;
    shuffling = true;
    shuffleBtn.classList.add('is-spinning');
    shuffleBtn.disabled = true;

    const picks = pickTools(TILE_COUNT);

    if (mountObserver) mountObserver.disconnect();

    /* Reuse tile elements. Rebuild iframe entirely so fresh load listeners fire. */
    tiles.forEach((t, i) => {
      const tool = picks[i];
      const seed = pickSeed(tool.slug);
      const url = embedUrl(tool.slug, seed);

      t.token++;             // invalidates any in-flight load callbacks from the prior iframe
      t.slug = tool.slug;
      t.seed = seed;
      t.url = url;
      t.settled = false;
      t.mounted = false;
      t.el.dataset.slug = tool.slug;
      t.el.href = url;
      t.el.classList.remove('is-ready', 'is-failed');

      /* Update label + skeleton text to the new tool name */
      const label = t.el.querySelector('.tile__label span');
      if (label) label.textContent = tool.name;
      const skel = t.el.querySelector('.tile__skel');
      if (skel) skel.textContent = tool.name;
      const fail = t.el.querySelector('.tile__fail');
      if (fail) fail.firstChild.textContent = 'Preview unavailable';

      /* Drop the old iframe so mountTile creates a fresh one with fresh listeners. */
      if (t.iframe) {
        t.iframe.remove();
        t.iframe = null;
      }
    });

    setupMountObserver();

    /* Release the button once the eager lane has started. */
    setTimeout(() => {
      shuffling = false;
      shuffleBtn.classList.remove('is-spinning');
      shuffleBtn.disabled = false;
    }, Math.min(priorityTileCount(), tiles.length) * PRIORITY_STAGGER_MS + 220);
  }

  shuffleBtn.addEventListener('click', shuffle);

  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const tag = e.target && e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === 's' || e.key === 'S') {
      shuffle();
      e.preventDefault();
    }
  });

  /* ── postMessage: ignore. We don't auto-resize tiles — they're square by design. ── */
  /* (The embed contract from tools-embed.js posts heights; we deliberately drop them
     so each tile keeps its 1:1 aspect ratio regardless of the tool's natural height.) */

  /* ── Toolbar controls ─────────────────────────────────────────────────
     - Style change   → tool set may change → full rebuild (new picks).
     - Palette/monogram change → same picks, just rebuild iframe URLs. */

  function rebuildAll() {
    buildTiles();
    setupMountObserver();
  }

  /* Same (slug, seed) per tile, but rerun loads with the new URL params. */
  function reloadInPlace() {
    if (mountObserver) mountObserver.disconnect();

    tiles.forEach((t) => {
      const url = embedUrl(t.slug, t.seed);
      t.token++;
      t.url = url;
      t.settled = false;
      t.mounted = false;
      t.el.href = url;
      t.el.classList.remove('is-ready', 'is-failed');
      if (t.iframe) { t.iframe.remove(); t.iframe = null; }
    });

    setupMountObserver();
  }

  /* Segmented controls: Color (palette) and Style. */
  document.querySelectorAll('.seg__opt').forEach((btn) => {
    btn.addEventListener('click', () => {
      const ctl = btn.dataset.ctl;
      const value = btn.dataset.value;
      if (state[ctl] === value) return;

      const group = btn.parentElement;
      group.querySelectorAll('.seg__opt').forEach((o) => {
        const active = (o === btn);
        o.classList.toggle('is-active', active);
        o.setAttribute('aria-checked', String(active));
      });

      state[ctl] = value;
      if (ctl === 'style') rebuildAll();
      else                 reloadInPlace();
    });
  });

  /* Monogram input: A–Z and 0–9, debounced. */
  const monoInput = document.getElementById('monogram');
  let monoTimer = null;
  monoInput.addEventListener('input', () => {
    const cleaned = monoInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 2);
    if (cleaned !== monoInput.value) monoInput.value = cleaned;
    if (state.monogram === cleaned) return;
    state.monogram = cleaned;
    clearTimeout(monoTimer);
    monoTimer = setTimeout(reloadInPlace, 280);
  });

  /* ── Boot ── */
  /* Load the preset bank, then build the wall. If the fetch fails we
     fall back to single-default-seed behavior (still renders, just
     non-curated). The dev server serves presets.json directly; in
     production GH Pages does the same. */
  fetch('./presets.json', { cache: 'no-store' })
    .then((res) => res.ok ? res.json() : {})
    .catch(() => ({}))
    .then((data) => {
      PRESETS = (data && typeof data === 'object') ? data : {};
      buildTiles();
      setupMountObserver();
    });
})();
</script>

</body>
</html>
