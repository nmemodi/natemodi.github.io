<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slash Mark</title>
    <link rel="stylesheet" href="/shared/tools-shared.css">
    <style>
        /* Tool-specific overrides only */
        .shape-btn.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
        }

        .link-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            cursor: pointer;
            margin-left: auto;
        }

        .link-label input[type="checkbox"] {
            width: 12px;
            height: 12px;
            accent-color: var(--color-accent);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="tool-sidebar">
        <div class="tool-header">
            <h1 class="tool-header__title">Slash Mark</h1>
        </div>
        <p class="tool-hint">Tapered parallel lines through geometric shapes. Adjust controls to explore variations.</p>

        <div class="section-label">Lines</div>

        <div class="control-group">
            <label>Count <span class="val" id="numLinesVal">11</span></label>
            <input type="range" id="numLines" min="1" max="30" value="11">
        </div>

        <div class="control-group">
            <label>Angle <span class="val" id="angleVal">30</span></label>
            <input type="range" id="angle" min="0" max="180" value="30">
        </div>

        <div class="control-group">
            <label>Width <span class="val" id="lineWidthVal">5</span></label>
            <input type="range" id="lineWidth" min="1" max="40" value="5">
        </div>

        <div class="control-group">
            <label>Taper <span class="val" id="taperVal">95</span></label>
            <input type="range" id="taper" min="0" max="100" value="95">
        </div>

        <div class="control-group">
            <label>Spread <span class="val" id="spreadVal">65</span></label>
            <input type="range" id="spread" min="10" max="100" value="65">
        </div>

        <div class="control-group">
            <label>Extension <span class="val" id="extensionVal">3</span></label>
            <input type="range" id="extension" min="-30" max="60" value="3">
        </div>

        <div class="section-label">Shape</div>

        <div class="control-group">
            <div class="presets">
                <button class="preset-btn shape-btn active" data-shape="circle">Circle</button>
                <button class="preset-btn shape-btn" data-shape="square">Square</button>
                <button class="preset-btn shape-btn" data-shape="hexagon">Hex</button>
                <button class="preset-btn shape-btn" data-shape="triangle">Tri</button>
            </div>
        </div>

        <div class="control-group">
            <label>Size <span class="val" id="shapeSizeVal">200</span></label>
            <input type="range" id="shapeSize" min="50" max="350" value="200">
        </div>

        <div class="section-label">Colors</div>

        <div class="control-group">
            <label>Background</label>
            <div class="color-row">
                <input type="color" id="bgColor" value="#c8c8c8">
                <span class="color-hex" id="bgColorVal">#c8c8c8</span>
            </div>
        </div>

        <div class="control-group">
            <label>Fill</label>
            <div class="color-row">
                <input type="color" id="shapeColor" value="#1a1a1a">
                <span class="color-hex" id="shapeColorVal">#1a1a1a</span>
            </div>
        </div>

        <div class="control-group">
            <label>
                Lines
                <span class="link-label">
                    <input type="checkbox" id="matchBg" checked>
                    match bg
                </span>
            </label>
            <div class="color-row">
                <input type="color" id="lineColor" value="#c8c8c8">
                <span class="color-hex" id="lineColorVal">#c8c8c8</span>
            </div>
        </div>

        <div class="section-label">Presets</div>

        <div class="control-group">
            <div class="presets">
                <button class="preset-btn" data-preset="classic">Classic</button>
                <button class="preset-btn" data-preset="minimal">Minimal</button>
                <button class="preset-btn" data-preset="venetian">Venetian</button>
                <button class="preset-btn" data-preset="burst">Burst</button>
                <button class="preset-btn" data-preset="bold">Bold</button>
                <button class="preset-btn" data-preset="inverse">Inverse</button>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-secondary" id="resetBtn">Reset</button>
            <button class="btn btn-primary btn-export" id="openExport">Export</button>
        </div>
    </div>

    <div class="tool-canvas tool-canvas--fill">
        <canvas id="canvas"></canvas>
    </div>

    <script src="/shared/schema-helpers.js"></script>
    <script src="/shared/rng.js"></script>
    <script src="/shared/permalink.js"></script>
    <script src="/shared/tools-export.js"></script>
    <script>
        // ---- State ----
        const config = {
            numLines: 11,
            angle: 30,
            lineWidth: 5,
            taper: 0.95,
            spread: 0.65,
            extension: 3,
            shape: 'circle',
            shapeSize: 200,
            bgColor: '#c8c8c8',
            shapeColor: '#1a1a1a',
            lineColor: '#c8c8c8',
            matchBg: true
        };

        const presets = {
            classic:   { numLines: 11, angle: 30,  lineWidth: 5,  taper: 0.95, spread: 0.65, extension: 3,  shape: 'circle',   shapeSize: 200, bgColor: '#c8c8c8', shapeColor: '#1a1a1a', lineColor: '#c8c8c8', matchBg: true },
            minimal:   { numLines: 4,  angle: 20,  lineWidth: 12, taper: 0.85, spread: 0.45, extension: 0,  shape: 'circle',   shapeSize: 220, bgColor: '#f0f0f0', shapeColor: '#222222', lineColor: '#f0f0f0', matchBg: true },
            venetian:  { numLines: 22, angle: 90,  lineWidth: 4,  taper: 0.15, spread: 0.88, extension: 12, shape: 'square',   shapeSize: 200, bgColor: '#e8e0d4', shapeColor: '#2a1f14', lineColor: '#e8e0d4', matchBg: true },
            burst:     { numLines: 28, angle: 45,  lineWidth: 2,  taper: 1.0,  spread: 0.92, extension: 18, shape: 'circle',   shapeSize: 200, bgColor: '#0a0a0a', shapeColor: '#f0f0f0', lineColor: '#0a0a0a', matchBg: true },
            bold:      { numLines: 3,  angle: 0,   lineWidth: 22, taper: 0,    spread: 0.35, extension: 25, shape: 'hexagon',  shapeSize: 200, bgColor: '#1a1a2e', shapeColor: '#e63946', lineColor: '#1a1a2e', matchBg: true },
            inverse:   { numLines: 9,  angle: 140, lineWidth: 6,  taper: 0.75, spread: 0.6,  extension: 0,  shape: 'circle',   shapeSize: 220, bgColor: '#111111', shapeColor: '#e8e8e8', lineColor: '#111111', matchBg: true },
        };

        // ---- Canvas setup ----
        const canvasEl = document.getElementById('canvas');
        const wrap = document.querySelector('.tool-canvas');

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const w = wrap.clientWidth;
            const h = wrap.clientHeight;
            canvasEl.width = w * dpr;
            canvasEl.height = h * dpr;
            canvasEl.style.width = w + 'px';
            canvasEl.style.height = h + 'px';
            const ctx = canvasEl.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { ctx, w, h };
        }

        // ---- Geometry: shape vertices ----
        function getShapeVertices(shape, cx, cy, size) {
            const verts = [];
            let sides, offsetAngle;
            switch (shape) {
                case 'square':   sides = 4; offsetAngle = Math.PI / 4; break;
                case 'hexagon':  sides = 6; offsetAngle = -Math.PI / 2; break;
                case 'triangle': sides = 3; offsetAngle = -Math.PI / 2; break;
                default: return verts;
            }
            for (let i = 0; i < sides; i++) {
                const a = (i / sides) * Math.PI * 2 + offsetAngle;
                verts.push({ x: cx + size * Math.cos(a), y: cy + size * Math.sin(a) });
            }
            return verts;
        }

        function getShapePath(shape, cx, cy, size) {
            const path = new Path2D();
            if (shape === 'circle') {
                path.arc(cx, cy, size, 0, Math.PI * 2);
            } else {
                const verts = getShapeVertices(shape, cx, cy, size);
                path.moveTo(verts[0].x, verts[0].y);
                for (let i = 1; i < verts.length; i++) path.lineTo(verts[i].x, verts[i].y);
                path.closePath();
            }
            return path;
        }

        // ---- Geometry: ray-shape intersection ----
        function raySegmentIntersect(px, py, dx, dy, ax, ay, bx, by) {
            const ex = bx - ax, ey = by - ay;
            const denom = dx * ey - dy * ex;
            if (Math.abs(denom) < 1e-10) return null;
            const t = ((ax - px) * ey - (ay - py) * ex) / denom;
            const s = ((ax - px) * dy - (ay - py) * dx) / denom;
            return (s >= 0 && s <= 1) ? t : null;
        }

        function rayPolygonIntersect(px, py, dx, dy, vertices) {
            const ts = [];
            for (let i = 0; i < vertices.length; i++) {
                const j = (i + 1) % vertices.length;
                const t = raySegmentIntersect(px, py, dx, dy,
                    vertices[i].x, vertices[i].y, vertices[j].x, vertices[j].y);
                if (t !== null) ts.push(t);
            }
            if (ts.length < 2) return null;
            ts.sort((a, b) => a - b);
            return [ts[0], ts[ts.length - 1]];
        }

        // ---- Taper profile ----
        function widthProfile(t, taper) {
            return (1 - taper) + taper * Math.sin(Math.PI * t);
        }

        // ---- Compute all line endpoints ----
        function computeLines(cx, cy) {
            const angleRad = config.angle * Math.PI / 180;
            const dirX = Math.sin(angleRad);
            const dirY = -Math.cos(angleRad);
            const perpX = Math.cos(angleRad);
            const perpY = Math.sin(angleRad);
            const n = config.numLines;
            const totalSpan = config.shapeSize * 2 * config.spread;
            const lines = [];

            for (let i = 0; i < n; i++) {
                const offset = n === 1 ? 0 : -totalSpan / 2 + totalSpan * i / (n - 1);
                const mx = cx + offset * perpX;
                const my = cy + offset * perpY;

                let t1, t2;
                if (config.shape === 'circle') {
                    const d2 = offset * offset;
                    const r2 = config.shapeSize * config.shapeSize;
                    if (d2 >= r2) continue;
                    const half = Math.sqrt(r2 - d2);
                    t1 = -half;
                    t2 = half;
                } else {
                    const verts = getShapeVertices(config.shape, cx, cy, config.shapeSize);
                    const result = rayPolygonIntersect(mx, my, dirX, dirY, verts);
                    if (!result) continue;
                    t1 = result[0];
                    t2 = result[1];
                }

                t1 -= config.extension;
                t2 += config.extension;

                lines.push({
                    x1: mx + t1 * dirX, y1: my + t1 * dirY,
                    x2: mx + t2 * dirX, y2: my + t2 * dirY
                });
            }

            return { lines, perpX, perpY };
        }

        // ---- Draw tapered line on canvas ----
        function drawTaperedLine(ctx, line, maxWidth, taper, nx, ny) {
            const steps = 36;
            const halfW = maxWidth / 2;
            const dx = line.x2 - line.x1;
            const dy = line.y2 - line.y1;

            ctx.beginPath();
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const w = halfW * widthProfile(t, taper);
                const x = line.x1 + dx * t + nx * w;
                const y = line.y1 + dy * t + ny * w;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            for (let i = steps; i >= 0; i--) {
                const t = i / steps;
                const w = halfW * widthProfile(t, taper);
                ctx.lineTo(line.x1 + dx * t - nx * w, line.y1 + dy * t - ny * w);
            }
            ctx.closePath();
            ctx.fill();
        }

        // ---- Main draw ----
        function draw() {
            const { ctx, w, h } = setupCanvas();
            const cx = w / 2, cy = h / 2;

            ctx.fillStyle = config.bgColor;
            ctx.fillRect(0, 0, w, h);

            const shapePath = getShapePath(config.shape, cx, cy, config.shapeSize);
            ctx.fillStyle = config.shapeColor;
            ctx.fill(shapePath);

            const { lines, perpX, perpY } = computeLines(cx, cy);
            ctx.fillStyle = config.lineColor;
            for (const line of lines) {
                drawTaperedLine(ctx, line, config.lineWidth, config.taper, perpX, perpY);
            }
        }

        // ---- Render to arbitrary canvas (for export) ----
        function renderToExportCanvas(ctx, w, h, opts) {
            const cx = w / 2, cy = h / 2;

            if (!opts.transparent) {
                ctx.fillStyle = config.bgColor;
                ctx.fillRect(0, 0, w, h);
            }

            const shapePath = getShapePath(config.shape, cx, cy, config.shapeSize);
            ctx.fillStyle = config.shapeColor;
            ctx.fill(shapePath);

            const { lines, perpX, perpY } = computeLines(cx, cy);
            ctx.fillStyle = config.lineColor;
            for (const line of lines) {
                drawTaperedLine(ctx, line, config.lineWidth, config.taper, perpX, perpY);
            }
        }

        // ---- SVG generation ----
        function generateSVG() {
            const pad = 30;
            const sz = config.shapeSize + pad;
            const vw = sz * 2, vh = sz * 2;
            const cx = vw / 2, cy = vh / 2;

            let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${vw} ${vh}" width="${vw}" height="${vh}">\n`;
            svg += `<rect width="${vw}" height="${vh}" fill="${config.bgColor}"/>\n`;

            if (config.shape === 'circle') {
                svg += `<circle cx="${cx}" cy="${cy}" r="${config.shapeSize}" fill="${config.shapeColor}"/>\n`;
            } else {
                const verts = getShapeVertices(config.shape, cx, cy, config.shapeSize);
                svg += `<polygon points="${verts.map(v => v.x.toFixed(2) + ',' + v.y.toFixed(2)).join(' ')}" fill="${config.shapeColor}"/>\n`;
            }

            const { lines, perpX, perpY } = computeLines(cx, cy);
            const steps = 36;
            const halfW = config.lineWidth / 2;

            for (const line of lines) {
                const dx = line.x2 - line.x1, dy = line.y2 - line.y1;
                let d = '';
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const w = halfW * widthProfile(t, config.taper);
                    const x = (line.x1 + dx * t + perpX * w).toFixed(2);
                    const y = (line.y1 + dy * t + perpY * w).toFixed(2);
                    d += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
                }
                for (let i = steps; i >= 0; i--) {
                    const t = i / steps;
                    const w = halfW * widthProfile(t, config.taper);
                    const x = (line.x1 + dx * t - perpX * w).toFixed(2);
                    const y = (line.y1 + dy * t - perpY * w).toFixed(2);
                    d += 'L' + x + ',' + y + ' ';
                }
                d += 'Z';
                svg += `<path d="${d}" fill="${config.lineColor}"/>\n`;
            }

            svg += '</svg>';
            return svg;
        }

        // ---- Controls ----
        function bindRange(id, prop, divisor) {
            const el = document.getElementById(id);
            const valEl = document.getElementById(id + 'Val');
            el.addEventListener('input', function () {
                const raw = parseFloat(this.value);
                config[prop] = divisor ? raw / divisor : raw;
                valEl.textContent = Math.round(raw);
                draw();
            });
        }

        function bindColor(id, prop) {
            const el = document.getElementById(id);
            const valEl = document.getElementById(id + 'Val');
            el.addEventListener('input', function () {
                config[prop] = this.value;
                valEl.textContent = this.value;
                if (prop === 'bgColor' && config.matchBg) {
                    config.lineColor = this.value;
                    document.getElementById('lineColor').value = this.value;
                    document.getElementById('lineColorVal').textContent = this.value;
                }
                draw();
            });
        }

        bindRange('numLines', 'numLines');
        bindRange('angle', 'angle');
        bindRange('lineWidth', 'lineWidth');
        bindRange('taper', 'taper', 100);
        bindRange('spread', 'spread', 100);
        bindRange('extension', 'extension');
        bindRange('shapeSize', 'shapeSize');
        bindColor('bgColor', 'bgColor');
        bindColor('shapeColor', 'shapeColor');
        bindColor('lineColor', 'lineColor');

        document.getElementById('lineColor').addEventListener('input', function () {
            if (this.value !== config.bgColor) {
                config.matchBg = false;
                document.getElementById('matchBg').checked = false;
            }
        });

        document.getElementById('matchBg').addEventListener('change', function () {
            config.matchBg = this.checked;
            if (this.checked) {
                config.lineColor = config.bgColor;
                document.getElementById('lineColor').value = config.bgColor;
                document.getElementById('lineColorVal').textContent = config.bgColor;
                draw();
            }
        });

        // Shape selector
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                config.shape = this.dataset.shape;
                draw();
            });
        });

        // Sync all UI from config
        function syncUI() {
            const map = [
                ['numLines', 'numLines', 1],
                ['angle', 'angle', 1],
                ['lineWidth', 'lineWidth', 1],
                ['taper', 'taper', 100],
                ['spread', 'spread', 100],
                ['extension', 'extension', 1],
                ['shapeSize', 'shapeSize', 1],
            ];
            for (const [id, prop, mul] of map) {
                const v = Math.round(config[prop] * (mul || 1));
                document.getElementById(id).value = v;
                document.getElementById(id + 'Val').textContent = v;
            }
            for (const [id, prop] of [['bgColor', 'bgColor'], ['shapeColor', 'shapeColor'], ['lineColor', 'lineColor']]) {
                document.getElementById(id).value = config[prop];
                document.getElementById(id + 'Val').textContent = config[prop];
            }
            document.getElementById('matchBg').checked = config.matchBg;
            document.querySelectorAll('.shape-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.shape === config.shape);
            });
        }

        // Presets
        document.querySelectorAll('.preset-btn:not(.shape-btn)').forEach(btn => {
            btn.addEventListener('click', function () {
                const p = presets[this.dataset.preset];
                if (!p) return;
                Object.assign(config, JSON.parse(JSON.stringify(p)));
                syncUI();
                draw();
            });
        });

        // Reset
        document.getElementById('resetBtn').addEventListener('click', function () {
            Object.assign(config, JSON.parse(JSON.stringify(presets.classic)));
            syncUI();
            draw();
        });

        // Resize
        window.addEventListener('resize', draw);

        // ---- Export setup ----
        const pad = 30;
        const exportSize = () => (config.shapeSize + pad) * 2;

        // ---- Permalink ----
        const { INT_RANGE, FLOAT_RANGE, COLOR, ENUM, BOOL } = window.LogoSchema;
        const pschema = {
            n:  INT_RANGE(1, 30, 11),
            a:  INT_RANGE(0, 180, 30),
            lw: INT_RANGE(1, 40, 5),
            tp: INT_RANGE(0, 100, 95),
            sp: INT_RANGE(10, 100, 65),
            ex: INT_RANGE(-30, 60, 3),
            sh: ENUM(['circle','square','hexagon','triangle'], 'circle'),
            sz: INT_RANGE(50, 350, 200),
            bg: COLOR('#c8c8c8'),
            sc: COLOR('#1a1a1a'),
            lc: COLOR('#c8c8c8'),
            mb: BOOL(true),
        };
        function getPermalinkState() {
            return {
                n: config.numLines, a: config.angle, lw: config.lineWidth,
                tp: Math.round(config.taper * 100), sp: Math.round(config.spread * 100),
                ex: config.extension, sh: config.shape, sz: config.shapeSize,
                bg: config.bgColor, sc: config.shapeColor, lc: config.lineColor,
                mb: config.matchBg,
            };
        }
        function applyPermalinkState(s) {
            config.numLines = s.n; config.angle = s.a; config.lineWidth = s.lw;
            config.taper = s.tp / 100; config.spread = s.sp / 100; config.extension = s.ex;
            config.shape = s.sh; config.shapeSize = s.sz;
            config.bgColor = s.bg; config.shapeColor = s.sc; config.lineColor = s.lc;
            config.matchBg = s.mb;
            syncUI();
            draw();
        }
        const pm = new window.PermalinkManager({
            toolName: 'slash-mark',
            schema: pschema, getState: getPermalinkState, applyState: applyPermalinkState,
        });
        ['numLines','angle','lineWidth','taper','spread','extension','shapeSize',
         'bgColor','shapeColor','lineColor','matchBg'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            const evt = (el.type === 'checkbox') ? 'change' : 'input';
            el.addEventListener(evt, () => pm.update());
        });
        document.querySelectorAll('.shape-btn, .preset-btn, #resetBtn').forEach(btn =>
            btn.addEventListener('click', () => pm.update()));

        new ToolExporter({
            toolName: 'slash-mark',
            getCanvas: () => canvasEl,
            getSVG: generateSVG,
            getBackgroundColor: () => config.bgColor,
            baseWidth: exportSize(),
            baseHeight: exportSize(),
            renderToCanvas: (ctx, w, h, opts) => {
                // Re-compute base size for export
                const sz = exportSize();
                const scaleX = w / sz;
                const scaleY = h / sz;
                ctx.save();
                ctx.scale(scaleX, scaleY);
                renderToExportCanvas(ctx, sz, sz, opts);
                ctx.restore();
            },
            getPermalink: () => pm.getPermalink(),
            flushPermalink: () => pm.flush(),
        });

        // Go
        draw();
        pm.decode();
    </script>
<script src="/shared/tools-nav.js"></script>
</body>
</html>
