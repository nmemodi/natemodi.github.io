<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliced Shapes</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/shared/tools-shared.css">
<style>
    /* Tool-specific overrides only */
    select {
        width: 100%;
        padding: 6px 8px;
        font-size: var(--text-xs);
        background: var(--color-surface);
        color: var(--color-text-muted);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        outline: none;
        cursor: pointer;
    }
</style>
</head>
<body>
    <div class="tool-sidebar">
        <div class="tool-header">
            <h1 class="tool-header__title">Sliced Shapes</h1>
        </div>
        <p class="tool-hint">Shapes bisected by curved lines at varying angles. Adjust controls to explore.</p>

        <div class="section-label">Layout</div>

        <div class="control-group">
            <label>Count <span class="val" id="countVal">3</span></label>
            <input type="range" id="count" min="1" max="12" value="3" step="1">
        </div>

        <div class="control-group">
            <label>Shape</label>
            <select id="shape">
                <option value="circle" selected>Circle</option>
                <option value="square">Square</option>
                <option value="rounded-square">Rounded Square</option>
                <option value="diamond">Diamond</option>
                <option value="triangle">Triangle</option>
                <option value="inverted-triangle">Inverted Triangle</option>
                <option value="pentagon">Pentagon</option>
                <option value="hexagon">Hexagon</option>
                <option value="heptagon">Heptagon</option>
                <option value="octagon">Octagon</option>
                <option value="star-4">Star (4)</option>
                <option value="star-5">Star (5)</option>
                <option value="star-6">Star (6)</option>
                <option value="cross">Cross</option>
                <option value="semicircle">Semicircle</option>
                <option value="oval">Oval</option>
                <option value="teardrop">Teardrop</option>
                <option value="shield">Shield</option>
            </select>
        </div>

        <div class="control-group">
            <label>Size <span class="val" id="sizeVal">100</span></label>
            <input type="range" id="size" min="30" max="250" value="100">
        </div>

        <div class="control-group">
            <label>Spacing <span class="val" id="spacingVal">220</span></label>
            <input type="range" id="spacing" min="40" max="400" value="220">
        </div>

        <div class="section-label">Slice</div>

        <div class="control-group">
            <label>Curve Type</label>
            <select id="curveType">
                <option value="arc" selected>Arc</option>
                <option value="sine">Sine Wave</option>
                <option value="straight">Straight</option>
                <option value="s-curve">S-Curve</option>
                <option value="zigzag">Zigzag</option>
            </select>
        </div>

        <div class="control-group">
            <label>Base Angle <span class="val" id="baseAngleVal">0</span>&deg;</label>
            <input type="range" id="baseAngle" min="-180" max="180" value="0" step="1">
        </div>

        <div class="control-group">
            <label>Angle Spread <span class="val" id="angleSpreadVal">25</span>&deg;</label>
            <input type="range" id="angleSpread" min="0" max="90" value="25" step="1">
        </div>

        <div class="control-group">
            <label>Curvature <span class="val" id="curvatureVal">0.35</span></label>
            <input type="range" id="curvature" min="0" max="1" value="0.35" step="0.01">
        </div>

        <div class="control-group">
            <label>Gap Width <span class="val" id="gapWidthVal">8</span></label>
            <input type="range" id="gapWidth" min="1" max="40" value="8" step="0.5">
        </div>

        <div class="control-group">
            <label>Line Width <span class="val" id="lineWidthVal">0</span></label>
            <input type="range" id="lineWidth" min="0" max="8" value="0" step="0.5">
        </div>

        <div class="control-group">
            <label>Taper <span class="val" id="taperVal">0</span></label>
            <input type="range" id="taper" min="0" max="1" value="0" step="0.01">
        </div>

        <div class="control-group">
            <label>Offset <span class="val" id="sliceOffsetVal">0</span></label>
            <input type="range" id="sliceOffset" min="-0.5" max="0.5" value="0" step="0.01">
        </div>

        <div class="section-label">Style</div>

        <div class="control-group">
            <label>Background</label>
            <div class="color-row">
                <input type="color" id="bgColor" value="#c8c8c8">
                <span class="color-hex" id="bgColorVal">#c8c8c8</span>
            </div>
        </div>

        <div class="control-group">
            <label>Shape Fill</label>
            <div class="color-row">
                <input type="color" id="fillColor" value="#2a2a2a">
                <span class="color-hex" id="fillColorVal">#2a2a2a</span>
            </div>
        </div>

        <div class="control-group">
            <label>Line Color</label>
            <div class="color-row">
                <input type="color" id="lineColor" value="#000000">
                <span class="color-hex" id="lineColorVal">#000000</span>
            </div>
        </div>

        <div class="control-group">
            <label>Presets</label>
            <div class="presets">
                <button class="preset-btn" data-preset="modernist">Modernist</button>
                <button class="preset-btn" data-preset="zen">Zen</button>
                <button class="preset-btn" data-preset="brutalist">Brutalist</button>
                <button class="preset-btn" data-preset="ribbon">Ribbon</button>
                <button class="preset-btn" data-preset="lattice">Lattice</button>
                <button class="preset-btn" data-preset="bauhaus">Bauhaus</button>
                <button class="preset-btn" data-preset="sashimi">Sashimi</button>
                <button class="preset-btn" data-preset="eclipse">Eclipse</button>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-secondary" id="randomBtn">Randomize</button>
            <button class="btn btn-primary btn-export" id="openExport">Export</button>
        </div>
    </div>

    <div class="tool-canvas tool-canvas--fill">
        <canvas id="canvas"></canvas>
    </div>

    <script src="/shared/schema-helpers.js"></script>
    <script src="/shared/rng.js"></script>
    <script src="/shared/permalink.js"></script>
    <script src="/shared/tools-export.js"></script>
    <script>
const canvasEl = document.getElementById('canvas');
const ctx = canvasEl.getContext('2d');
const wrap = document.querySelector('.tool-canvas');

// ---- State ----
const S = {
    count: 3,
    shape: 'circle',
    size: 100,
    spacing: 220,
    curveType: 'arc',
    baseAngle: 0,
    angleSpread: 25,
    curvature: 0.35,
    gapWidth: 8,
    taper: 0,
    sliceOffset: 0,
    lineWidth: 0,
    bgColor: '#c8c8c8',
    fillColor: '#2a2a2a',
    lineColor: '#000000',
};

// ---- Presets ----
const presets = {
    modernist: { count: 3, shape: 'circle', size: 100, spacing: 220, curveType: 'arc', baseAngle: 0, angleSpread: 25, curvature: 0.35, gapWidth: 8, lineWidth: 0, taper: 0, sliceOffset: 0, bgColor: '#c8c8c8', fillColor: '#2a2a2a', lineColor: '#000000' },
    zen: { count: 5, shape: 'circle', size: 70, spacing: 155, curveType: 'sine', baseAngle: -10, angleSpread: 15, curvature: 0.3, gapWidth: 6, lineWidth: 0, taper: 0.4, sliceOffset: 0, bgColor: '#f5f0eb', fillColor: '#1a1a1a', lineColor: '#000000' },
    brutalist: { count: 4, shape: 'square', size: 90, spacing: 200, curveType: 'straight', baseAngle: 15, angleSpread: 30, curvature: 0, gapWidth: 10, lineWidth: 2, taper: 0, sliceOffset: 0, bgColor: '#e8e0d4', fillColor: '#111111', lineColor: '#e8e0d4' },
    ribbon: { count: 3, shape: 'circle', size: 100, spacing: 230, curveType: 's-curve', baseAngle: 0, angleSpread: 20, curvature: 0.6, gapWidth: 7, lineWidth: 0, taper: 0.5, sliceOffset: 0, bgColor: '#1a1a2e', fillColor: '#e0e0e0', lineColor: '#000000' },
    lattice: { count: 6, shape: 'hexagon', size: 55, spacing: 125, curveType: 'zigzag', baseAngle: 0, angleSpread: 40, curvature: 0.4, gapWidth: 5, lineWidth: 1, taper: 0, sliceOffset: 0, bgColor: '#0d1b2a', fillColor: '#e0fbfc', lineColor: '#e0fbfc' },
    bauhaus: { count: 3, shape: 'circle', size: 110, spacing: 250, curveType: 'straight', baseAngle: -20, angleSpread: 20, curvature: 0, gapWidth: 12, lineWidth: 3, taper: 0, sliceOffset: 0.1, bgColor: '#f0e6d3', fillColor: '#cc0000', lineColor: '#1a1a1a' },
    sashimi: { count: 4, shape: 'oval', size: 80, spacing: 180, curveType: 'arc', baseAngle: 5, angleSpread: 12, curvature: 0.25, gapWidth: 5, lineWidth: 0, taper: 0.7, sliceOffset: 0.05, bgColor: '#ffffff', fillColor: '#333333', lineColor: '#000000' },
    eclipse: { count: 3, shape: 'circle', size: 100, spacing: 230, curveType: 'arc', baseAngle: 30, angleSpread: 35, curvature: 0.5, gapWidth: 9, lineWidth: 0, taper: 0.3, sliceOffset: -0.1, bgColor: '#0a0a0a', fillColor: '#f0f0f0', lineColor: '#ffffff' },
};

// ---- Resize ----
const dpr = window.devicePixelRatio || 1;
function resize() {
    canvasEl.width = wrap.clientWidth * dpr;
    canvasEl.height = wrap.clientHeight * dpr;
    canvasEl.style.width = wrap.clientWidth + 'px';
    canvasEl.style.height = wrap.clientHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
}
window.addEventListener('resize', resize);

// ---- Shape paths (return Path2D in local coords centered at 0,0) ----
function shapePath(type, r) {
    const p = new Path2D();
    switch (type) {
        case 'circle':
            p.arc(0, 0, r, 0, Math.PI * 2);
            break;
        case 'square':
            p.rect(-r, -r, r * 2, r * 2);
            break;
        case 'rounded-square': {
            const cr = r * 0.2;
            p.moveTo(-r + cr, -r);
            p.lineTo(r - cr, -r);
            p.quadraticCurveTo(r, -r, r, -r + cr);
            p.lineTo(r, r - cr);
            p.quadraticCurveTo(r, r, r - cr, r);
            p.lineTo(-r + cr, r);
            p.quadraticCurveTo(-r, r, -r, r - cr);
            p.lineTo(-r, -r + cr);
            p.quadraticCurveTo(-r, -r, -r + cr, -r);
            break;
        }
        case 'diamond':
            p.moveTo(0, -r);
            p.lineTo(r, 0);
            p.lineTo(0, r);
            p.lineTo(-r, 0);
            p.closePath();
            break;
        case 'triangle':
            polygon(p, 3, r, -Math.PI / 2);
            break;
        case 'inverted-triangle':
            polygon(p, 3, r, Math.PI / 2);
            break;
        case 'pentagon':
            polygon(p, 5, r, -Math.PI / 2);
            break;
        case 'hexagon':
            polygon(p, 6, r, 0);
            break;
        case 'heptagon':
            polygon(p, 7, r, -Math.PI / 2);
            break;
        case 'octagon':
            polygon(p, 8, r, Math.PI / 8);
            break;
        case 'star-4':
            star(p, 4, r, r * 0.45);
            break;
        case 'star-5':
            star(p, 5, r, r * 0.45);
            break;
        case 'star-6':
            star(p, 6, r, r * 0.5);
            break;
        case 'cross': {
            const a = r * 0.35;
            p.moveTo(-a, -r); p.lineTo(a, -r); p.lineTo(a, -a);
            p.lineTo(r, -a); p.lineTo(r, a); p.lineTo(a, a);
            p.lineTo(a, r); p.lineTo(-a, r); p.lineTo(-a, a);
            p.lineTo(-r, a); p.lineTo(-r, -a); p.lineTo(-a, -a);
            p.closePath();
            break;
        }
        case 'semicircle':
            p.arc(0, 0, r, Math.PI, 0);
            p.closePath();
            break;
        case 'oval':
            p.ellipse(0, 0, r, r * 0.7, 0, 0, Math.PI * 2);
            break;
        case 'teardrop':
            p.moveTo(0, -r);
            p.bezierCurveTo(r * 0.6, -r, r, -r * 0.4, r, 0);
            p.arc(0, 0, r, 0, Math.PI);
            p.bezierCurveTo(-r, -r * 0.4, -r * 0.6, -r, 0, -r);
            break;
        case 'shield':
            p.moveTo(-r, -r);
            p.lineTo(r, -r);
            p.lineTo(r, r * 0.2);
            p.quadraticCurveTo(r, r * 0.7, 0, r);
            p.quadraticCurveTo(-r, r * 0.7, -r, r * 0.2);
            p.closePath();
            break;
        default:
            p.arc(0, 0, r, 0, Math.PI * 2);
    }
    return p;
}

function polygon(p, n, r, startAngle) {
    for (let i = 0; i <= n; i++) {
        const a = startAngle + (i / n) * Math.PI * 2;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) p.moveTo(x, y);
        else p.lineTo(x, y);
    }
    p.closePath();
}

function star(p, points, outerR, innerR) {
    const total = points * 2;
    for (let i = 0; i <= total; i++) {
        const a = -Math.PI / 2 + (i / total) * Math.PI * 2;
        const r = i % 2 === 0 ? outerR : innerR;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) p.moveTo(x, y);
        else p.lineTo(x, y);
    }
    p.closePath();
}

// ---- Slice curve generation ----
function sliceCurve(type, extent, curvature, offset, numPoints) {
    numPoints = numPoints || 80;
    const pts = [];
    const amp = extent * curvature;
    const off = offset * extent;

    for (let i = 0; i <= numPoints; i++) {
        const t = i / numPoints;
        const x = -extent + t * 2 * extent;
        let y = off;

        switch (type) {
            case 'arc':
                y += amp * (1 - (2 * t - 1) * (2 * t - 1));
                break;
            case 'sine':
                y += amp * Math.sin(t * Math.PI);
                break;
            case 'straight':
                break;
            case 's-curve':
                y += amp * Math.sin(t * Math.PI * 2 - Math.PI);
                break;
            case 'zigzag': {
                const zt = (t * 4) % 1;
                const seg = Math.floor(t * 4);
                y += amp * ((seg % 2 === 0) ? zt : 1 - zt) * (seg < 2 ? 1 : -1);
                if (curvature < 0.01) y = off;
                break;
            }
        }
        pts.push({ x, y });
    }
    return pts;
}

// ---- Draw ----
function draw() {
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;

    ctx.fillStyle = S.bgColor;
    ctx.fillRect(0, 0, W, H);

    const n = S.count;
    const r = S.size;
    const sp = S.spacing;
    const totalW = (n - 1) * sp;
    const startX = W / 2 - totalW / 2;
    const cy = H / 2;

    for (let i = 0; i < n; i++) {
        const cx = startX + i * sp;
        const angleDeg = S.baseAngle + (n > 1
            ? (i - (n - 1) / 2) * (S.angleSpread * 2 / Math.max(n - 1, 1))
            : 0);
        const angle = angleDeg * Math.PI / 180;

        drawSlicedShape(ctx, cx, cy, r, angle, i, n);
    }
}

function drawSlicedShape(drawCtx, cx, cy, r, angle, idx, total) {
    const extent = r * 1.5;
    const halfGap = S.gapWidth / 2;
    const curve = sliceCurve(S.curveType, extent, S.curvature, S.sliceOffset, 80);

    drawCtx.save();
    drawCtx.translate(cx, cy);

    for (let side = -1; side <= 1; side += 2) {
        drawCtx.save();

        const sign = side;
        const farY = sign * (r * 3);

        drawCtx.rotate(angle);

        const offsetCurve = curve.map((pt, i) => {
            const t = i / curve.length;
            const taperMul = 1 - S.taper * (1 - Math.sin(t * Math.PI));
            const g = halfGap * taperMul;
            return { x: pt.x, y: pt.y + sign * g };
        });

        drawCtx.beginPath();
        drawCtx.moveTo(offsetCurve[0].x, offsetCurve[0].y);
        for (let j = 1; j < offsetCurve.length; j++) {
            drawCtx.lineTo(offsetCurve[j].x, offsetCurve[j].y);
        }
        drawCtx.lineTo(extent, farY);
        drawCtx.lineTo(-extent, farY);
        drawCtx.closePath();

        drawCtx.rotate(-angle);

        drawCtx.clip();

        const sp = shapePath(S.shape, r);
        drawCtx.fillStyle = S.fillColor;
        drawCtx.fill(sp);

        drawCtx.restore();
    }

    if (S.lineWidth > 0) {
        drawCtx.save();
        drawCtx.rotate(angle);

        const clipShape = shapePath(S.shape, r);
        drawCtx.save();
        drawCtx.rotate(-angle);
        drawCtx.clip(clipShape);
        drawCtx.rotate(angle);

        drawCtx.beginPath();
        drawCtx.moveTo(curve[0].x, curve[0].y);
        for (let j = 1; j < curve.length; j++) {
            drawCtx.lineTo(curve[j].x, curve[j].y);
        }
        drawCtx.strokeStyle = S.lineColor;
        drawCtx.lineWidth = S.lineWidth;
        drawCtx.lineCap = 'round';
        drawCtx.stroke();

        drawCtx.restore();
    }

    drawCtx.restore();
}

// ---- Render to arbitrary canvas (for export) ----
function renderToExportCanvas(exportCtx, w, h, opts) {
    if (!opts.transparent) {
        exportCtx.fillStyle = S.bgColor;
        exportCtx.fillRect(0, 0, w, h);
    }

    const n = S.count;
    const r = S.size;
    const sp = S.spacing;
    const totalW = (n - 1) * sp;
    const startX = w / 2 - totalW / 2;
    const cy = h / 2;

    for (let i = 0; i < n; i++) {
        const cx = startX + i * sp;
        const angleDeg = S.baseAngle + (n > 1
            ? (i - (n - 1) / 2) * (S.angleSpread * 2 / Math.max(n - 1, 1))
            : 0);
        const angle = angleDeg * Math.PI / 180;

        drawSlicedShape(exportCtx, cx, cy, r, angle, i, n);
    }
}

// ---- SVG generation ----
function generateSVG() {
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;
    let svgParts = [];
    svgParts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`);
    svgParts.push(`<rect width="${W}" height="${H}" fill="${S.bgColor}"/>`);

    const n = S.count;
    const r = S.size;
    const sp = S.spacing;
    const totalW = (n - 1) * sp;
    const startX = W / 2 - totalW / 2;
    const cy = H / 2;
    const extent = r * 1.5;
    const halfGap = S.gapWidth / 2;

    for (let i = 0; i < n; i++) {
        const cx = startX + i * sp;
        const angleDeg = S.baseAngle + (n > 1
            ? (i - (n - 1) / 2) * (S.angleSpread * 2 / Math.max(n - 1, 1))
            : 0);

        const curve = sliceCurve(S.curveType, extent, S.curvature, S.sliceOffset, 80);
        const shapeD = svgShapePath(S.shape, r);
        const clipId1 = `clip-${i}-top`;
        const clipId2 = `clip-${i}-bot`;

        for (let side = -1; side <= 1; side += 2) {
            const clipId = side === -1 ? clipId1 : clipId2;
            const farY = side * (r * 3);
            const offsetCurve = curve.map((pt, j) => {
                const t = j / curve.length;
                const taperMul = 1 - S.taper * (1 - Math.sin(t * Math.PI));
                const g = halfGap * taperMul;
                return { x: pt.x, y: pt.y + side * g };
            });

            let clipD = `M${offsetCurve[0].x.toFixed(2)},${offsetCurve[0].y.toFixed(2)}`;
            for (let j = 1; j < offsetCurve.length; j++) {
                clipD += `L${offsetCurve[j].x.toFixed(2)},${offsetCurve[j].y.toFixed(2)}`;
            }
            clipD += `L${extent},${farY}L${-extent},${farY}Z`;

            svgParts.push(`<defs><clipPath id="${clipId}" transform="translate(${cx},${cy}) rotate(${angleDeg})">`);
            svgParts.push(`<path d="${clipD}"/>`);
            svgParts.push(`</clipPath></defs>`);
            svgParts.push(`<path d="${shapeD}" fill="${S.fillColor}" transform="translate(${cx},${cy})" clip-path="url(#${clipId})"/>`);
        }
    }

    svgParts.push('</svg>');
    return svgParts.join('\n');
}

function svgShapePath(type, r) {
    switch (type) {
        case 'circle':
            return `M${-r},0A${r},${r},0,1,1,${r},0A${r},${r},0,1,1,${-r},0Z`;
        case 'square':
            return `M${-r},${-r}H${r}V${r}H${-r}Z`;
        case 'rounded-square': {
            const cr = r * 0.2;
            return `M${-r+cr},${-r}H${r-cr}Q${r},${-r},${r},${-r+cr}V${r-cr}Q${r},${r},${r-cr},${r}H${-r+cr}Q${-r},${r},${-r},${r-cr}V${-r+cr}Q${-r},${-r},${-r+cr},${-r}Z`;
        }
        case 'diamond':
            return `M0,${-r}L${r},0L0,${r}L${-r},0Z`;
        case 'oval':
            return `M${-r},0A${r},${r*0.7},0,1,1,${r},0A${r},${r*0.7},0,1,1,${-r},0Z`;
        default: {
            let pts = [];
            const info = {
                'triangle': [3, -Math.PI/2],
                'inverted-triangle': [3, Math.PI/2],
                'pentagon': [5, -Math.PI/2],
                'hexagon': [6, 0],
                'heptagon': [7, -Math.PI/2],
                'octagon': [8, Math.PI/8],
            };
            if (info[type]) {
                const [n, sa] = info[type];
                for (let i = 0; i < n; i++) {
                    const a = sa + (i / n) * Math.PI * 2;
                    pts.push([Math.cos(a) * r, Math.sin(a) * r]);
                }
            } else if (type.startsWith('star-')) {
                const n = parseInt(type.split('-')[1]);
                const inner = type === 'star-6' ? r * 0.5 : r * 0.45;
                for (let i = 0; i < n * 2; i++) {
                    const a = -Math.PI/2 + (i / (n*2)) * Math.PI * 2;
                    const rad = i % 2 === 0 ? r : inner;
                    pts.push([Math.cos(a) * rad, Math.sin(a) * rad]);
                }
            } else if (type === 'cross') {
                const a = r * 0.35;
                pts = [[-a,-r],[a,-r],[a,-a],[r,-a],[r,a],[a,a],[a,r],[-a,r],[-a,a],[-r,a],[-r,-a],[-a,-a]];
            } else if (type === 'semicircle') {
                return `M${-r},0A${r},${r},0,0,1,${r},0Z`;
            } else if (type === 'teardrop') {
                return `M0,${-r}C${r*0.6},${-r},${r},${-r*0.4},${r},0A${r},${r},0,0,1,${-r},0C${-r},${-r*0.4},${-r*0.6},${-r},0,${-r}Z`;
            } else if (type === 'shield') {
                return `M${-r},${-r}H${r}V${r*0.2}Q${r},${r*0.7},0,${r}Q${-r},${r*0.7},${-r},${r*0.2}Z`;
            } else {
                return `M${-r},0A${r},${r},0,1,1,${r},0A${r},${r},0,1,1,${-r},0Z`;
            }
            if (pts.length) {
                let d = `M${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
                for (let i = 1; i < pts.length; i++) d += `L${pts[i][0].toFixed(2)},${pts[i][1].toFixed(2)}`;
                return d + 'Z';
            }
            return '';
        }
    }
}

// ---- Controls ----
function bindRange(id, prop, isFloat) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(id + 'Val');
    el.addEventListener('input', function() {
        S[prop] = isFloat ? parseFloat(this.value) : parseInt(this.value);
        valEl.textContent = this.value;
        draw();
    });
}

function bindColor(id, prop) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(id + 'Val');
    el.addEventListener('input', function() {
        S[prop] = this.value;
        valEl.textContent = this.value;
        draw();
    });
}

function bindSelect(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener('change', function() {
        S[prop] = this.value;
        draw();
    });
}

bindRange('count', 'count');
bindRange('size', 'size');
bindRange('spacing', 'spacing');
bindRange('baseAngle', 'baseAngle');
bindRange('angleSpread', 'angleSpread');
bindRange('curvature', 'curvature', true);
bindRange('gapWidth', 'gapWidth', true);
bindRange('lineWidth', 'lineWidth', true);
bindRange('taper', 'taper', true);
bindRange('sliceOffset', 'sliceOffset', true);
bindColor('bgColor', 'bgColor');
bindColor('fillColor', 'fillColor');
bindColor('lineColor', 'lineColor');
bindSelect('shape', 'shape');
bindSelect('curveType', 'curveType');

function syncUI() {
    for (const [id, prop] of [
        ['count', 'count'], ['size', 'size'], ['spacing', 'spacing'],
        ['baseAngle', 'baseAngle'], ['angleSpread', 'angleSpread'],
        ['curvature', 'curvature'], ['gapWidth', 'gapWidth'],
        ['lineWidth', 'lineWidth'],
        ['taper', 'taper'], ['sliceOffset', 'sliceOffset']
    ]) {
        document.getElementById(id).value = S[prop];
        document.getElementById(id + 'Val').textContent = S[prop];
    }
    for (const [id, prop] of [['bgColor', 'bgColor'], ['fillColor', 'fillColor'], ['lineColor', 'lineColor']]) {
        document.getElementById(id).value = S[prop];
        document.getElementById(id + 'Val').textContent = S[prop];
    }
    document.getElementById('shape').value = S.shape;
    document.getElementById('curveType').value = S.curveType;
}

// Presets
document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const p = presets[this.dataset.preset];
        if (!p) return;
        Object.assign(S, p);
        syncUI();
        draw();
    });
});

// Randomize — uses seeded RNG (mulberry32) so Randomize + share = reproducible
function applyRandom(seed) {
    const rand = window.LogoRNG.mulberry32(seed);
    const shapes = ['circle','square','rounded-square','diamond','triangle','hexagon','octagon','oval','pentagon','star-5','shield'];
    const curves = ['arc','sine','straight','s-curve','zigzag'];
    S.count = 2 + Math.floor(rand() * 6);
    S.shape = shapes[Math.floor(rand() * shapes.length)];
    S.size = 60 + Math.floor(rand() * 140);
    S.spacing = Math.round(S.size * (1.1 + rand() * 0.8));
    S.curveType = curves[Math.floor(rand() * curves.length)];
    S.baseAngle = Math.floor(rand() * 60 - 30);
    S.angleSpread = Math.floor(rand() * 50);
    S.curvature = +(rand() * 0.7).toFixed(2);
    S.gapWidth = +(3 + rand() * 15).toFixed(1);
    S.lineWidth = rand() > 0.6 ? +(1 + rand() * 4).toFixed(1) : 0;
    S.taper = +(rand() * 0.8).toFixed(2);
    S.sliceOffset = +((rand() - 0.5) * 0.3).toFixed(2);

    if (rand() > 0.5) {
        const hue = Math.floor(rand() * 360);
        const light = 70 + Math.floor(rand() * 25);
        S.bgColor = hslToHex(hue, 10, light);
        S.fillColor = hslToHex(hue, 15, 10 + Math.floor(rand() * 20));
    } else {
        const hue = Math.floor(rand() * 360);
        S.bgColor = hslToHex(hue, 10, 5 + Math.floor(rand() * 15));
        S.fillColor = hslToHex(hue, 10, 80 + Math.floor(rand() * 18));
    }
    S.lineColor = S.fillColor;
    S.seed = seed;
}

document.getElementById('randomBtn').addEventListener('click', function() {
    applyRandom(window.LogoRNG.randomSeed());
    syncUI();
    draw();
});

function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
    };
    return '#' + f(0) + f(8) + f(4);
}

// ---- Export setup ----
const exportW = 800;
const exportH = 800;

// ---- Permalink ----
const LS = window.LogoSchema;
const pschema = {
    c:  LS.INT_RANGE(1, 12, 3),
    sh: LS.ENUM(['circle','square','rounded-square','diamond','triangle','inverted-triangle','pentagon','hexagon','heptagon','octagon','star-4','star-5','star-6','cross','semicircle','oval','teardrop','shield'], 'circle'),
    sz: LS.INT_RANGE(30, 250, 100),
    sp: LS.INT_RANGE(40, 400, 220),
    cv: LS.ENUM(['arc','sine','straight','s-curve','zigzag'], 'arc'),
    ba: LS.INT_RANGE(-180, 180, 0),
    as: LS.INT_RANGE(0, 90, 25),
    cu: LS.FLOAT_RANGE(0, 1, 0.35, 2),
    gw: LS.FLOAT_RANGE(1, 40, 8, 1),
    lw: LS.FLOAT_RANGE(0, 8, 0, 1),
    tp: LS.FLOAT_RANGE(0, 1, 0, 2),
    so: LS.FLOAT_RANGE(-0.5, 0.5, 0, 2),
    bg: LS.COLOR('#c8c8c8'),
    fc: LS.COLOR('#2a2a2a'),
    lc: LS.COLOR('#000000'),
    sd: LS.SEED(0),
};
S.seed = 0;
function getPermalinkState() {
    return {
        c: S.count, sh: S.shape, sz: S.size, sp: S.spacing, cv: S.curveType,
        ba: S.baseAngle, as: S.angleSpread, cu: S.curvature, gw: S.gapWidth,
        lw: S.lineWidth, tp: S.taper, so: S.sliceOffset,
        bg: S.bgColor, fc: S.fillColor, lc: S.lineColor, sd: S.seed || 0,
    };
}
function applyPermalinkState(s) {
    S.count = s.c; S.shape = s.sh; S.size = s.sz; S.spacing = s.sp;
    S.curveType = s.cv; S.baseAngle = s.ba; S.angleSpread = s.as;
    S.curvature = s.cu; S.gapWidth = s.gw; S.lineWidth = s.lw;
    S.taper = s.tp; S.sliceOffset = s.so;
    S.bgColor = s.bg; S.fillColor = s.fc; S.lineColor = s.lc;
    S.seed = s.sd;
    syncUI();
    draw();
}
const pm = new window.PermalinkManager({
    toolName: 'sliced-shapes',
    schema: pschema, getState: getPermalinkState, applyState: applyPermalinkState,
});
['count','shape','size','spacing','curveType','baseAngle','angleSpread',
 'curvature','gapWidth','lineWidth','taper','sliceOffset',
 'bgColor','fillColor','lineColor'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const evt = (el.tagName === 'SELECT') ? 'change' : 'input';
    el.addEventListener(evt, () => pm.update());
});
document.querySelectorAll('.preset-btn, #randomBtn').forEach(btn =>
    btn.addEventListener('click', () => pm.update()));

new ToolExporter({
    toolName: 'sliced-shapes',
    getCanvas: () => canvasEl,
    getSVG: generateSVG,
    getBackgroundColor: () => S.bgColor,
    baseWidth: exportW,
    baseHeight: exportH,
    renderToCanvas: (expCtx, w, h, opts) => {
        const scaleX = w / exportW;
        const scaleY = h / exportH;
        expCtx.save();
        expCtx.scale(scaleX, scaleY);
        renderToExportCanvas(expCtx, exportW, exportH, opts);
        expCtx.restore();
    },
    getPermalink: () => pm.getPermalink(),
    flushPermalink: () => pm.flush(),
});

// ---- Init ----
resize();
pm.decode();
    </script>
